<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Available Food Listings - FoodLink</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">
                <i class="fas fa-hand-holding-heart"></i> FoodLink
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link d-none" id="nav-add-food" href="donate.html">Add Food</a></li>
                    <li class="nav-item"><a class="nav-link active" href="food_list.html">Food List</a></li>
                    <li class="nav-item"><a class="nav-link text-danger d-none" id="nav-logout" href="#">Logout</a></li>
                    <li class="nav-item"><a class="nav-link text-info d-none" id="nav-login" href="login.html">Login</a></li>
                    <li class="nav-item">
                        <div class="theme-switch-wrapper">
                            <button id="theme-toggle" title="Toggle Dark/Light Mode">
                                <i class="fas fa-moon"></i>
                            </button>
                        </div>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <h2 class="text-success mb-4 border-bottom pb-2">Available Food Donations</h2>
        
        <!-- Smart Filtering -->
        <div class="card shadow-sm border-0 mb-4 bg-light">
            <div class="card-body">
                <div class="row g-2 align-items-end">
                    <div class="col-md-3">
                        <label class="form-label text-secondary small mb-1">Location / City</label>
                        <input type="text" id="filter-location" class="form-control form-control-sm" placeholder="e.g. Mumbai">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label text-secondary small mb-1">Expiry Urgency</label>
                        <select id="filter-expiry" class="form-select form-select-sm">
                            <option value="all">All</option>
                            <option value="red">Urgent (< 1 hr)</option>
                            <option value="orange">Moderate (1-3 hrs)</option>
                            <option value="green">Safe (> 3 hrs)</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label text-secondary small mb-1">Min. Quantity</label>
                        <input type="number" id="filter-quantity" class="form-control form-control-sm" placeholder="e.g. 50">
                    </div>
                    <div class="col-md-2">
                        <label class="form-label text-secondary small mb-1">Max Distance(km)</label>
                        <input type="number" id="filter-distance" class="form-control form-control-sm" placeholder="e.g. 10">
                    </div>
                    <div class="col-md-2">
                        <button class="btn btn-success btn-sm w-100 fw-bold" id="apply-filters-btn"><i class="bi bi-funnel me-1"></i>Apply</button>
                    </div>
                </div>
            </div>
        </div>
        
        <div id="loading-spinner" class="text-center my-5 d-none">
            <div class="spinner-border text-success" role="status"></div>
            <p class="mt-2 text-secondary">Loading available food...</p>
        </div>
        
        <div id="food-list-container" class="row">
            <!-- Cards will be dynamically added here -->
        </div>

        <div id="no-food-msg" class="alert alert-info d-none text-center shadow-sm">
            Currently, no food is available for pickup. Check back later!
        </div>
    </div>

    <!-- Chatbot Widget -->
    <div class="chat-widget">
        <div class="chat-container" id="chatContainer">
            <div class="chat-header">
                <h6><i class="fas fa-robot me-2"></i>FoodLink Assistant</h6>
                <button class="close-chat" id="closeChat"><i class="fas fa-times"></i></button>
            </div>
            <div class="chat-messages" id="chatMessages">
                <div class="message bot">
                    Hello! I'm your FoodLink assistant. How can I help you today?
                </div>
            </div>
            <div class="chat-input-area">
                <input type="text" id="chatInput" placeholder="Type a message...">
                <button id="sendMessage"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
        <button class="chat-btn" id="chatBtn">
            <i class="fas fa-comment-dots"></i>
        </button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="js/main.js"></script>
    <script type="module" src="js/food-list.js"></script>
</body>
</html>
