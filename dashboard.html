<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - FoodLink</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
    <!-- Leaflet Maps CSS & JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">FoodLink</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link active" href="dashboard.html">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link d-none" id="nav-add-food" href="donate.html">Add Food</a></li>
                    <li class="nav-item"><a class="nav-link" href="food_list.html">Food List</a></li>
                    <li class="nav-item"><a class="nav-link text-danger" id="nav-logout" href="#">Logout</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="text-success m-0" id="welcome-msg">Dashboard</h2>
            <div id="role-badge-container"></div>
        </div>

        <div id="analytics-dashboard" class="row mb-4 d-none">
            <div class="col-md-4 mb-3">
                <div class="card bg-success text-white shadow-sm border-0 h-100">
                    <div class="card-body d-flex flex-column justify-content-center align-items-center">
                        <i class="bi bi-box-seam fs-1 mb-2"></i>
                        <h3 id="stat-donations" class="fw-bold m-0">0</h3>
                        <p class="m-0 text-white-50" id="stat-donations-label">Total Donations</p>
                    </div>
                </div>
            </div>
            <div class="col-md-4 mb-3">
                <div class="card bg-primary text-white shadow-sm border-0 h-100">
                    <div class="card-body d-flex flex-column justify-content-center align-items-center">
                        <i class="bi bi-people fs-1 mb-2"></i>
                        <h3 id="stat-meals" class="fw-bold m-0">0</h3>
                        <p class="m-0 text-white-50">Meals Served/Recovered</p>
                    </div>
                </div>
            </div>
            <div class="col-md-4 mb-3">
                <div class="card bg-warning text-dark shadow-sm border-0 h-100">
                    <div class="card-body d-flex flex-column justify-content-center align-items-center">
                        <i class="bi bi-truck fs-1 mb-2"></i>
                        <h3 id="stat-pickups" class="fw-bold m-0">0</h3>
                        <p class="m-0 text-dark-50">Active Pickups</p>
                    </div>
                </div>
            </div>
        </div>
        <hr class="mb-5">

        <div id="loading-spinner" class="text-center my-5">
            <div class="spinner-border text-success" role="status"></div>
            <p class="mt-2 text-secondary">Loading dashboard...</p>
        </div>

        <!-- Provider View -->
        <div id="provider-view" class="d-none">
            
            <!-- AI Prediction Module -->
            <div class="card shadow-sm border-0 mb-4 bg-light">
                <div class="card-body">
                    <h5 class="text-success mb-3">AI Food Waste Prediction</h5>
                    <div class="row g-2 align-items-end">
                        <div class="col-md-3">
                            <label class="form-label text-secondary small mb-1">Event Type</label>
                            <select id="ai-event-type" class="form-select form-select-sm">
                                <option value="wedding">Wedding</option>
                                <option value="party">Party</option>
                                <option value="restaurant">Restaurant</option>
                                <option value="corporate">Corporate</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label text-secondary small mb-1">Number of Guests</label>
                            <input type="number" id="ai-guests" class="form-control form-control-sm" placeholder="e.g. 100">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label text-secondary small mb-1">Food Prepared (plates/kg)</label>
                            <input type="number" id="ai-food" class="form-control form-control-sm" placeholder="e.g. 120">
                        </div>
                        <div class="col-md-3">
                            <button class="btn btn-success btn-sm w-100" id="ai-predict-btn">Predict Waste</button>
                        </div>
                    </div>
                    <div id="ai-result" class="mt-3 text-danger fw-bold d-none"></div>
                </div>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-4 mt-4">
                <h4 class="text-success m-0">My Donations</h4>
                <a href="donate.html" class="btn btn-primary">Add Food</a>
            </div>
            <div class="row" id="provider-donations-list">
                <!-- Populated dynamically -->
            </div>
        </div>

        <!-- NGO View -->
        <div id="ngo-view" class="d-none">
            <div class="d-flex justify-content-between align-items-center mb-4 mt-4">
                <h4 class="text-success m-0">My Pickups</h4>
                <a href="food_list.html" class="btn btn-primary">Find Available Food</a>
            </div>
            <div class="row" id="ngo-pickups-list">
                <!-- Populated dynamically -->
            </div>
        </div>
    </div>

    <!-- Map Modal -->
    <div class="modal fade" id="mapModal" tabindex="-1" aria-labelledby="mapModalLabel" aria-hidden="true">
      <div class="modal-dialog modal-lg">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title text-success" id="mapModalLabel">Pickup Route</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <div id="map-container" style="height: 400px; width: 100%;" class="bg-light d-flex align-items-center justify-content-center text-secondary">
                Map loading...
            </div>
            <div id="route-info" class="mt-3 fw-bold text-success text-center"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Toast Container for Notifications -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index: 1055">
      <div id="liveToast" class="toast align-items-center text-bg-success border-0" role="alert" aria-live="assertive" aria-atomic="true">
        <div class="d-flex">
          <div class="toast-body" id="toast-body">
            New food available nearby!
          </div>
          <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
        <script type="module">
        import { 
            auth, 
            db, 
            onAuthStateChanged, 
            signOut,
            doc, 
            getDoc,
            collection,
            query,
            where,
            onSnapshot,
            updateDoc,
            addDoc,
            serverTimestamp,
            getDocs
        } from './js/firebase-config.js';

        const loadingSpinner = document.getElementById('loading-spinner');
        const providerView = document.getElementById('provider-view');
        const ngoView = document.getElementById('ngo-view');
        
        let currentUser = null;

        // Ensure user is logged in
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                
                // Logout btn
                const logoutBtn = document.getElementById('nav-logout');
                logoutBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    signOut(auth).then(() => window.location.href = "login.html");
                });

                // Get User Role
                try {
                    const userDoc = await getDoc(doc(db, "users", user.uid));
                    if (userDoc.exists()) {
                        const userData = userDoc.data();
                        document.getElementById('welcome-msg').textContent = `Welcome, ${userData.name}!`;

                        loadingSpinner.classList.add('d-none');

                        if (userData.role === 'Provider') {
                            document.getElementById('role-badge-container').innerHTML = `<span class="badge bg-success">Provider Profile</span>`;
                            document.getElementById('nav-add-food').classList.remove('d-none');
                            providerView.classList.remove('d-none');
                            document.getElementById('analytics-dashboard').classList.remove('d-none');
                            initAIPredictor();
                            loadProviderDashboard(user.uid);
                        } else if (userData.role === 'NGO') {
                            document.getElementById('role-badge-container').innerHTML = `<span class="badge bg-primary">NGO Profile</span>`;
                            ngoView.classList.remove('d-none');
                            document.getElementById('analytics-dashboard').classList.remove('d-none');
                            document.getElementById('stat-donations-label').innerText = "Total Recovered Foods";
                            loadNGODashboard(user.uid);
                        }
                    }
                } catch (error) {
                    console.error("Error fetching user data:", error);
                }
            } else {
                window.location.href = "login.html";
            }
        });

        function initAIPredictor() {
            const aiBtn = document.getElementById('ai-predict-btn');
            if (aiBtn) {
                aiBtn.addEventListener('click', async () => {
                    const type = document.getElementById('ai-event-type').value;
                    const guests = parseInt(document.getElementById('ai-guests').value);
                    const food = parseInt(document.getElementById('ai-food').value);
                    if(!guests || !food) return;
                    
                    let multiplier = 0.15;
                    if(type === 'wedding') multiplier = 0.20;
                    if(type === 'restaurant') multiplier = 0.10;
                    
                    const predictedWaste = Math.round(food * multiplier);
                    const resDiv = document.getElementById('ai-result');
                    resDiv.textContent = `Estimated leftover food for future event: ${predictedWaste} plates`;
                    resDiv.classList.remove('d-none');
                    
                    try {
                        await addDoc(collection(db, "ai_data"), {
                            eventType: type,
                            numberOfGuests: guests,
                            foodPrepared: food,
                            predictedWaste: predictedWaste,
                            createdAt: serverTimestamp()
                        });
                    } catch(e) { console.error(e); }
                });
            }
        }

        function formatTimeLeft(expiryStr) {
            const expiryTime = new Date(expiryStr).getTime();
            const now = new Date().getTime();
            if (expiryTime < now) return "Expired";
            const diffHours = Math.floor((expiryTime - now) / (1000 * 60 * 60));
            const diffMins = Math.floor(((expiryTime - now) % (1000 * 60 * 60)) / (1000 * 60));
            return `Expires in: ${diffHours}h ${diffMins}m`;
        }

        function showToast(msg) {
            const toastMsg = document.getElementById('toast-body');
            toastMsg.textContent = msg;
            const toastEl = document.getElementById('liveToast');
            const toast = new bootstrap.Toast(toastEl);
            toast.show();
        }

        function loadProviderDashboard(uid) {
            const listContainer = document.getElementById('provider-donations-list');
            const donationsRef = collection(db, "donations");
            const q = query(donationsRef, where("providerId", "==", uid));

            onSnapshot(q, (snapshot) => {
                listContainer.innerHTML = '';
                
                let totalDons = 0;
                let mealsServed = 0;
                let activePickups = 0;

                if (snapshot.empty) {
                    listContainer.innerHTML = '<div class="col-12"><div class="alert alert-info">You have not made any donations yet.</div></div>';
                    document.getElementById('stat-donations').innerText = totalDons;
                    document.getElementById('stat-meals').innerText = mealsServed;
                    document.getElementById('stat-pickups').innerText = activePickups;
                    return;
                }

                snapshot.forEach((docSnap) => {
                    const food = docSnap.data();
                    totalDons++;
                    if(food.status === 'delivered') mealsServed += parseInt(food.quantity) || 0;
                    if(food.status === 'accepted') activePickups++;

                    let badgeClass = "bg-success";
                    if(food.status === "accepted") badgeClass = "bg-warning text-dark";
                    if(food.status === "delivered") badgeClass = "bg-secondary";

                    const col = document.createElement('div');
                    col.className = 'col-md-6 mb-4';
                    col.innerHTML = `
                        <div class="card h-100 shadow-sm border-0">
                            <div class="card-body">
                                <div class="d-flex justify-content-between align-items-start mb-2">
                                    <h5 class="card-title text-success fw-bold"><i class="bi bi-basket me-2"></i>${food.foodName}</h5>
                                    <span class="badge ${badgeClass} status-badge">${food.status.toUpperCase()}</span>
                                </div>
                                <p class="card-text text-secondary mb-1"><i class="bi bi-box me-2"></i><strong>Quantity:</strong> ${food.quantity}</p>
                                <p class="card-text text-secondary mb-1"><i class="bi bi-geo-alt me-2"></i><strong>Location:</strong> ${food.location}</p>
                                <p class="card-text ${formatTimeLeft(food.expiryTime)==='Expired' ? 'text-danger' : 'text-secondary'} fw-bold mb-3"><i class="bi bi-clock me-2"></i>${formatTimeLeft(food.expiryTime)}</p>
                                ${food.status === 'accepted' ? `<button class="btn btn-outline-success w-100 btn-sm deliver-btn" data-id="${docSnap.id}"><i class="bi bi-check-circle me-1"></i>Mark as Delivered</button>` : ''}
                            </div>
                        </div>
                    `;
                    listContainer.appendChild(col);

                    // Add deliver logic for this specific element
                    const deliverBtn = col.querySelector('.deliver-btn');
                    if (deliverBtn) {
                        deliverBtn.addEventListener('click', async (e) => {
                            const donationId = e.target.getAttribute('data-id');
                            try {
                                deliverBtn.disabled = true;
                                deliverBtn.textContent = "Updating...";
                                await updateDoc(doc(db, "donations", donationId), {
                                    status: "delivered"
                                });
                                // Update corresponding pickup
                                const pq = query(collection(db, "pickups"), where("donationId", "==", donationId));
                                const pSnap = await getDocs(pq);
                                pSnap.forEach(async (pDoc) => {
                                    await updateDoc(doc(db, "pickups", pDoc.id), { status: "completed" });
                                });
                            } catch(err) {
                                console.error("Error updating status: ", err);
                                deliverBtn.disabled = false;
                                deliverBtn.innerHTML = `<i class="bi bi-check-circle me-1"></i>Mark as Delivered`;
                            }
                        });
                    }
                });
                
                document.getElementById('stat-donations').innerText = totalDons;
                document.getElementById('stat-meals').innerText = mealsServed;
                document.getElementById('stat-pickups').innerText = activePickups;
            });
        }

        // To reliably show pickup data in the NGO view, we need to query pickups where ngoId == uid and join it with donations manually, or just query donations where status == accepted. Let's do a join via pickups collection.
        function loadNGODashboard(uid) {
            const listContainer = document.getElementById('ngo-pickups-list');
            const pickupsRef = collection(db, "pickups");
            const q = query(pickupsRef, where("ngoId", "==", uid));

            onSnapshot(q, async (snapshot) => {
                listContainer.innerHTML = '';
                
                let totalRec = 0;
                let mealsRec = 0;
                let activePickups = 0;

                if (snapshot.empty) {
                    listContainer.innerHTML = '<div class="col-12"><div class="alert alert-info">You have not accepted any pickups yet.</div></div>';
                    document.getElementById('stat-donations').innerText = totalRec;
                    document.getElementById('stat-meals').innerText = mealsRec;
                    document.getElementById('stat-pickups').innerText = activePickups;
                    return;
                }

                for (let docSnap of snapshot.docs) {
                    const pickup = docSnap.data();
                    try {
                        totalRec++;
                        if(pickup.status === 'accepted') activePickups++;

                        const donationDoc = await getDoc(doc(db, "donations", pickup.donationId));
                        if (donationDoc.exists()) {
                            const food = donationDoc.data();
                            if(pickup.status === 'completed' || food.status === 'delivered') mealsRec += parseInt(food.quantity) || 0;
                            
                            let badgeClass = "bg-warning text-dark";
                            if(food.status === "delivered" || pickup.status === "completed") badgeClass = "bg-secondary";

                            const col = document.createElement('div');
                            col.className = 'col-md-6 mb-4';
                            col.innerHTML = `
                                <div class="card h-100 shadow-sm border-0">
                                    <div class="card-body">
                                        <div class="d-flex justify-content-between align-items-start mb-2">
                                            <h5 class="card-title text-success fw-bold"><i class="bi bi-basket me-2"></i>${food.foodName}</h5>
                                            <span class="badge ${badgeClass} status-badge">${food.status.toUpperCase()}</span>
                                        </div>
                                        <p class="card-text text-secondary mb-1"><i class="bi bi-box me-2"></i><strong>Quantity:</strong> ${food.quantity}</p>
                                        <p class="card-text text-secondary mb-3"><i class="bi bi-geo-alt me-2"></i><strong>Pickup From:</strong> ${food.location}</p>
                                        <div class="d-flex justify-content-between align-items-center">
                                            <p class="card-text text-secondary mb-0"><i class="bi bi-info-circle me-1"></i><strong>Status:</strong> ${pickup.status}</p>
                                            ${pickup.status === 'accepted' ? `<button class="btn btn-sm btn-outline-primary" onclick="window.viewRoute('${food.location}')"><i class="bi bi-map me-1"></i>View Route</button>` : ''}
                                        </div>
                                    </div>
                                </div>
                            `;
                            listContainer.appendChild(col);
                        }
                    } catch(err) {
                        console.error("Failed to load donation: ", err);
                    }
                }
                
                document.getElementById('stat-donations').innerText = totalRec;
                document.getElementById('stat-meals').innerText = mealsRec;
                document.getElementById('stat-pickups').innerText = activePickups;
            });

            // Notification system
            const dRef = collection(db, "donations");
            const dQuery = query(dRef, where("status", "==", "available"));
            let isInitialDonationLoad = true;
            onSnapshot(dQuery, (snapshot) => {
                if (isInitialDonationLoad) {
                    isInitialDonationLoad = false;
                    return;
                }
                snapshot.docChanges().forEach((change) => {
                    if (change.type === "added") {
                        const food = change.doc.data();
                        const toastMsg = document.getElementById('toast-body');
                        toastMsg.textContent = `New food available: ${food.foodName} (${food.quantity})`;
                        const toastEl = document.getElementById('liveToast');
                        const toast = new bootstrap.Toast(toastEl);
                        toast.show();
                    }
                });
            });
        }

        let currentLeafletMap = null;
        let routeControl = null;

        window.viewRoute = function(destinationLocation) {
            const modalEl = document.getElementById('mapModal');
            const modal = new bootstrap.Modal(modalEl);
            modal.show();
            
            const mapContainer = document.getElementById('map-container');
            const routeInfo = document.getElementById('route-info');
            mapContainer.innerHTML = '<div class="w-100 h-100 d-flex justify-content-center align-items-center"><div class="spinner-border text-success"></div></div>';
            routeInfo.textContent = 'Calculating route...';

            let ngoLocation = { lat: 19.0760, lng: 72.8777 }; // default fallback 
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        ngoLocation = { lat: position.coords.latitude, lng: position.coords.longitude };
                        initLeafletMap(ngoLocation, destinationLocation);
                    },
                    (error) => {
                        console.error("Geolocation error:", error);
                        initLeafletMap(ngoLocation, destinationLocation);
                    }
                );
            } else {
                initLeafletMap(ngoLocation, destinationLocation);
            }

            // Important: Leaflet requires invalidateSize when rendered inside a previously hidden modal
            modalEl.addEventListener('shown.bs.modal', function () {
                if(currentLeafletMap) {
                    currentLeafletMap.invalidateSize();
                }
            }, { once: true });
        };

        async function initLeafletMap(origin, destinationStr) {
            document.getElementById('map-container').innerHTML = '<div id="leafletMapId" style="width: 100%; height: 100%;"></div>';
            
            if(currentLeafletMap !== null) {
                currentLeafletMap.remove();
                currentLeafletMap = null;
            }

            currentLeafletMap = L.map('leafletMapId').setView([origin.lat, origin.lng], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                maxZoom: 19,
                attribution: '© OpenStreetMap'
            }).addTo(currentLeafletMap);

            try {
                // Free Geocoding via Nominatim
                const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&limit=1&q=${encodeURIComponent(destinationStr)}`);
                const data = await res.json();
                
                if(data && data.length > 0) {
                    const destLat = parseFloat(data[0].lat);
                    const destLng = parseFloat(data[0].lon);

                    routeControl = L.Routing.control({
                        waypoints: [
                            L.latLng(origin.lat, origin.lng),
                            L.latLng(destLat, destLng)
                        ],
                        routeWhileDragging: false,
                        addWaypoints: false,
                        show: false, // Hides the bulky text directions
                        createMarker: function() { return null; } // Optional: hides default markers
                    }).addTo(currentLeafletMap);

                    // Add custom markers
                    L.marker([origin.lat, origin.lng]).addTo(currentLeafletMap).bindPopup("You are here").openPopup();
                    L.marker([destLat, destLng]).addTo(currentLeafletMap).bindPopup("Pickup Location");

                    routeControl.on('routesfound', function(e) {
                        const routes = e.routes;
                        const summary = routes[0].summary;
                        document.getElementById('route-info').textContent = `Distance: ${(summary.totalDistance / 1000).toFixed(1)} km | Est. Time: ${Math.round(summary.totalTime / 60)} mins`;
                    });
                } else {
                    document.getElementById('route-info').textContent = 'Could not precisely locate the address. Showing your location only.';
                }
            } catch(e) {
                console.error("Geocoding failed", e);
                document.getElementById('route-info').textContent = 'Failed to load route data.';
            }
        }
    </script>
</body>
</html>
